<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金魚と泡</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: url('bg.jpeg') center center / cover no-repeat;
    position: relative;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== 白い金魚 =====
class Goldfish {
  constructor(size) {
    this.size = size;
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = 0.25 + Math.random() * 0.35;
    this.turn = 0;
    this.targetTurn = 0;
    this.changeTimer = 0;
    this.tail = Math.random() * Math.PI * 2;
    this.tailSpeed = 0.1 + Math.random() * 0.06;
    this.redTint = Math.random() > 0.5;
  }
  update() {
    this.changeTimer--;
    if (this.changeTimer <= 0) {
      this.targetTurn = (Math.random() - 0.5) * 0.06;
      this.changeTimer = 40 + Math.random() * 120;
    }
    this.turn += (this.targetTurn - this.turn) * 0.05;
    this.angle += this.turn;

    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;

    const m = this.size * 2;
    if (this.x < m)      this.angle += (0 - this.angle) * 0.1 + 0.02;
    if (this.x > W - m)  this.angle += (Math.PI - this.angle) * 0.1;
    if (this.y < m)      this.angle += (Math.PI/2 - this.angle) * 0.05;
    if (this.y > H - m)  this.angle += (-Math.PI/2 - this.angle) * 0.05;

    this.x = Math.max(-m, Math.min(W + m, this.x));
    this.y = Math.max(-m, Math.min(H + m, this.y));

    this.tail += this.tailSpeed;
  }
  draw() {
    const s = this.size;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    const wag = Math.sin(this.tail) * 0.4;

    ctx.save();
    ctx.translate(-s * 0.7, 0);
    ctx.rotate(wag);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-s * 0.9, -s * 0.7, -s * 1.3, -s * 0.5);
    ctx.quadraticCurveTo(-s * 0.8, 0, -s * 1.3, s * 0.5);
    ctx.quadraticCurveTo(-s * 0.9, s * 0.7, 0, 0);
    ctx.fillStyle = this.redTint ? 'rgba(255,235,235,0.55)' : 'rgba(255,255,255,0.5)';
    ctx.fill();
    ctx.restore();

    ctx.beginPath();
    ctx.ellipse(0, 0, s, s * 0.6, 0, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(s*0.2, -s*0.2, s*0.1, 0, 0, s);
    g.addColorStop(0, 'rgba(255,255,255,0.95)');
    g.addColorStop(1, this.redTint ? 'rgba(255,225,225,0.8)' : 'rgba(245,250,255,0.8)');
    ctx.fillStyle = g;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(s * 0.1, -s * 0.55);
    ctx.quadraticCurveTo(-s * 0.1, -s * 1.0, -s * 0.4, -s * 0.5);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(s * 0.55, -s * 0.18, s * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = '#d94545';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.55, -s * 0.18, s * 0.05, 0, Math.PI * 2);
    ctx.fillStyle = '#5a1a1a';
    ctx.fill();

    ctx.restore();
  }
}

const fishes = [];
const fishCount = 5;
for (let i = 0; i < fishCount; i++) {
  fishes.push(new Goldfish(10 + Math.random() * 8));
}

// ===== 泡 =====
const bubbles = [];
function spawnBubble() {
  bubbles.push({
    x: Math.random() * W,
    y: H + 10,
    r: 1.5 + Math.random() * 4,
    speed: 0.4 + Math.random() * 0.9,
    sway: Math.random() * Math.PI * 2,
    swaySpeed: 0.02 + Math.random() * 0.03,
    alpha: 0.3 + Math.random() * 0.4
  });
}
for (let i = 0; i < 25; i++) {
  spawnBubble();
  bubbles[i].y = Math.random() * H;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.y -= b.speed;
    b.sway += b.swaySpeed;
    b.x += Math.sin(b.sway) * 0.4;
    if (b.y < -10) { bubbles.splice(i, 1); spawnBubble(); continue; }
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${b.alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${b.alpha * 0.8})`;
    ctx.fill();
  }

  for (const f of fishes) {
    f.update();
    f.draw();
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
