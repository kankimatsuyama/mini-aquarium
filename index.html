<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨の水辺</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: url('bg.png') center center / cover no-repeat;
    position: relative;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// --- 雨 ---
const rain = [];
for (let i = 0; i < 70; i++) {
  rain.push({
    x: Math.random() * 1000,
    y: Math.random() * 800,
    len: 8 + Math.random() * 10,
    speed: 4 + Math.random() * 3,
    alpha: 0.15 + Math.random() * 0.3
  });
}

// --- 波紋 ---
const ripples = [];
function addRipple() {
  // 画面下半分（水面側）に出す
  ripples.push({
    x: Math.random() * W,
    y: H * 0.45 + Math.random() * H * 0.55,
    r: 0,
    maxR: 18 + Math.random() * 28,
    alpha: 0.5,
    speed: 0.35 + Math.random() * 0.3
  });
}
setInterval(addRipple, 550);

// --- 花びら（紫陽花の淡い粒） ---
const petals = [];
for (let i = 0; i < 14; i++) {
  petals.push({
    x: Math.random() * 1000,
    y: Math.random() * 800,
    vx: (Math.random() - 0.5) * 0.25,
    vy: 0.1 + Math.random() * 0.2,
    r: 3 + Math.random() * 4,
    color: Math.random() > 0.5 ? 'rgba(168,200,232,' : 'rgba(200,184,224,',
    alpha: 0.25 + Math.random() * 0.35,
    rot: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.01
  });
}

let shimmer = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);

  // 光のゆらぎ（うっすら白い横線）
  shimmer += 0.01;
  ctx.save();
  ctx.globalAlpha = 0.05;
  for (let i = 0; i < 10; i++) {
    const y = H * 0.4 + (H * 0.6 / 10) * i;
    ctx.beginPath();
    ctx.moveTo(0, y);
    for (let x = 0; x <= W; x += 40) {
      ctx.lineTo(x, y + Math.sin(shimmer * 2 + x * 0.012 + i) * 6);
    }
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.restore();

  // 花びら
  for (const p of petals) {
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.spin;
    if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; }
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, p.r, p.r * 0.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = p.color + p.alpha + ')';
    ctx.fill();
    ctx.restore();
  }

  // 波紋
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += rp.speed;
    rp.alpha -= 0.006;
    if (rp.alpha <= 0 || rp.r > rp.maxR) { ripples.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.ellipse(rp.x, rp.y, rp.r, rp.r * 0.5, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${rp.alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    if (rp.r > 6) {
      ctx.beginPath();
      ctx.ellipse(rp.x, rp.y, rp.r * 0.6, rp.r * 0.3, 0, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${rp.alpha * 0.5})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
    }
  }

  // 雨
  ctx.save();
  for (const r of rain) {
    r.y += r.speed;
    r.x -= 0.5;
    if (r.y > H) { r.y = -20; r.x = Math.random() * W; }
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x - 1.5, r.y + r.len);
    ctx.strokeStyle = `rgba(220,240,250,${r.alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  ctx.restore();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
